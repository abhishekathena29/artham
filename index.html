<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artham</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              // --- Lavender palette built on two anchors: #4C3A69 (dark) and
              //     #B49DDC (light). Full shade scale:
              //     50 #f4f0fa · 100 #e7def3 · 200 #d6c8ea · 300 #b49ddc(light)
              //     400 #9478c4 · 500 #7458a6 · 600 #5e4788 · 700 #4c3a69(dark)
              //     800 #3b2d52 · 900 #2a2039
              //     On-colors: white on dark/accent fills, near-black on light.
              //     No flat grey — neutrals are lavender-tinted.

              // Accent (primary) — deep lavender #4C3A69
              primary: "#4c3a69",
              "on-primary": "#ffffff",
              "primary-container": "#e7def3",
              "on-primary-container": "#3b2d52",
              "primary-fixed": "#e7def3",
              "primary-fixed-dim": "#d6c8ea",
              "on-primary-fixed": "#2a2039",
              "on-primary-fixed-variant": "#4c3a69",
              "inverse-primary": "#b49ddc",
              "surface-tint": "#4c3a69",

              // Secondary — mid lavender (companion accent)
              secondary: "#7458a6",
              "on-secondary": "#ffffff",
              "secondary-container": "#ece3f6",
              "on-secondary-container": "#3b2d52",
              "secondary-fixed": "#ece3f6",
              "secondary-fixed-dim": "#d6c8ea",
              "on-secondary-fixed": "#2a2039",
              "on-secondary-fixed-variant": "#4c3a69",

              // Tertiary — light lavender #B49DDC (used for soft accents)
              tertiary: "#9478c4",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#efe8f8",
              "on-tertiary-container": "#4c3a69",
              "tertiary-fixed": "#efe8f8",
              "tertiary-fixed-dim": "#d6c8ea",
              "on-tertiary-fixed": "#2a2039",
              "on-tertiary-fixed-variant": "#4c3a69",

              // Error — rose red (reads clearly beside lavender)
              error: "#d64060",
              "on-error": "#ffffff",
              "error-container": "#fbdde4",
              "on-error-container": "#8f2540",

              // Neutral surfaces — faint lavender-white page, pure-white cards.
              background: "#f5f2fa",
              surface: "#ffffff",
              "surface-bright": "#ffffff",
              "surface-dim": "#eae5f2",
              "surface-variant": "#f0ecf7",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f9f7fc",
              "surface-container": "#f0ecf7",
              "surface-container-high": "#e8e2f1",
              "surface-container-highest": "#ded5ec",

              // Text / on-colors — deep plum near-black + muted lavender-taupe
              "on-surface": "#2a2039",
              "on-background": "#2a2039",
              "on-surface-variant": "#6b6280",
              outline: "#a89ec2",
              "outline-variant": "#e6e0f1",

              // Inverse (for tooltips / dark chips)
              "inverse-surface": "#2a2039",
              "inverse-on-surface": "#f5f2fa",
            },
            borderRadius: {
              DEFAULT: "0.625rem",
              lg: "0.875rem",
              xl: "1.25rem",
              "2xl": "1.5rem",
              "3xl": "1.75rem",
              full: "9999px",
            },
            spacing: {
              base: "8px",
              xl: "80px",
              "container-max": "1200px",
              md: "24px",
              lg: "48px",
              "margin-mobile": "16px",
              xs: "4px",
              gutter: "24px",
              sm: "12px",
            },
            fontFamily: {
              "headline-md": ["Public Sans"],
              "body-sm": ["Public Sans"],
              "label-sm": ["Public Sans"],
              "headline-lg-mobile": ["Public Sans"],
              "label-md": ["Public Sans"],
              "body-lg": ["Public Sans"],
              "body-md": ["Public Sans"],
              "headline-sm": ["Public Sans"],
              "headline-lg": ["Public Sans"],
            },
            fontSize: {
              "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }],
              "headline-lg-mobile": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }],
              "label-md": ["14px", { lineHeight: "16px", letterSpacing: "0.01em", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Public Sans", sans-serif;
        scroll-behavior: smooth;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
      }
      .fill-icon {
        font-variation-settings: "FILL" 1;
      }
      .tonal-card-shadow {
        box-shadow: 0 1px 2px rgba(42, 32, 57, 0.05), 0 8px 24px rgba(42, 32, 57, 0.08);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #ded5ec; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b49ddc; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #ded5ec; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #b49ddc; }
      @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      .active-entity-pulse { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

      /* Dashboard scope: warm, coral-forward, editorial. Lets the palette
         tokens (coral accent, sage success, warm neutrals) show through —
         only maps the few hard-coded green/amber utility classes onto the
         warm brand tones so nothing reads as raw cool green/grey. */
      .dash-mono { color: #2a2039; }
      .dash-mono [class~="text-green-700"] { color: #4c3a69 !important; }
      .dash-mono [class~="text-amber-700"] { color: #7458a6 !important; }
      .dash-mono [class~="bg-green-500"] { background-color: #4c3a69 !important; }
      .dash-mono [class~="bg-amber-500"] { background-color: #9478c4 !important; }
      .dash-mono [class~="bg-green-100"] { background-color: #e7def3 !important; }
      .dash-mono [class~="bg-amber-100"] { background-color: #efe8f8 !important; }
    </style>
  </head>
  <body class="bg-background text-on-background">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
